name: Base ➡️ Cabecera
node: header
boxes:
- align: center
  box:
    gap_ny: 2
  boxes:
  - if: '%%{{ and (ne page.Type "page") (ne page.Type "system") }}%%'
    img: /u/base/logo.svg
    fit: 0.25
    fit_vs: 0.5
  - boxes:
    - get:
      - to: title
      - to: icon
      caps: y
      icon_pos: sub
    - if: '%%{{ and (ne page.Type "page") (ne page.Type "system") }}%%'
      sub: Diseño, Fabricación e Instalación
    - tags:
      - type: type
      - type: tax
        tax: category
