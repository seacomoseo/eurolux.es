name: nos Caracteriza
color: white
boxes:
- title: Nos Caracteriza
  sub: Sabemos que tu proyecto nos necesita por que…
  icon: star
  box:
    cols: 2
    gap_vs: 0
    pd: 2
    pd_vs: 1
    align_y: strech
    caps: y
    line: y
  boxes:
  - order: 1
    bi: /u/nosotros/vives-sostenibilidad.jpg
  - title: Vives
    sub: SOSTENIBILIDAD
    order: 0
    md: |
      Porque vivir ya no significa desarrollarse dentro de un mundo limitado por muros. Perfeccionado nuestra gama de sistemas de carpintería de aluminio y toldos, para ofrecer los productos exactos en cada tipo de edificación y en cada ubicación dentro de la misma, permitirá conciliar la responsabilidad medioambiental con el confort deseado.
    align_y: center
    align: left
    align_vl: right
  - order: 2
    bi: /u/nosotros/sientes-puro-confort.jpg
  - title: Sientes
    sub: PURO CONFORT
    order: 3
    md: |
      Necesitas productos que se ajusten a tus hábitos y no al revés. En Eurolux buscamos el bienestar y la comodidad en cada uno de tus espacios, ya sea en casa, en la oficina, espacios comerciales y en cualquier otra edificación en la que transcurre parte de nuestra vida.
    align_y: center
    align: left
  - order: 5
    bi: /u/nosotros/disfruta-diseno.jpg
  - title: Disfrutas
    sub: DISEÑO
    order: 4
    md: |
      Ofrecemos cerramientos con diseños rectos, limpios, puros, que permiten conectar las estancias con el exterior, pero sin renunciar al máximo confort. Desde el momento en el que planeas una reforma o nueva construcción, nos adaptamos al grado de confort que quieres disfrutar.
    align_y: center
    align: left
    align_vl: right
